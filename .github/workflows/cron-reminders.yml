name: Hourly Reminders Cron

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  ping-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Route
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Triggering reminders cron endpoint..."
          curl -i -H "Authorization: Bearer $CRON_SECRET" https://edwaknutrition.co.ke/api/cron/reminders
